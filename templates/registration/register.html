<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #141414;
            color: white;
        }

        .register-box {
            max-width: 400px;
            margin: 100px auto;
            background: #1f1f1f;
            padding: 30px;
            border-radius: 12px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: none;
        }

        .helptext {
            display: none;
        }

        ul {
            display: none;
        }

        label {
            margin-bottom: 5px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="register-box">

    <h2 class="mb-4 text-center">
        🎬 Create Account
    </h2>

    <form method="POST">

        {% csrf_token %}

        <label>Username</label>
        {{ form.username }}

        <label>Password</label>
        {{ form.password1 }}

        <label>Confirm Password</label>
        {{ form.password2 }}

        <button class="btn btn-danger w-100 mt-3">
            Register
        </button>

    </form>

    <div class="text-center mt-3">
        <a href="/login/" class="text-light">
            Already have an account?
        </a>
    </div>

</div>

</body>
</html>
