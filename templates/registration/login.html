<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #141414;
            color: white;
        }

        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: #1f1f1f;
            padding: 30px;
            border-radius: 12px;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h2 class="mb-4 text-center">🎬 MovieFeed Login</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Username</label>
            {{ form.username }}
        </div>

        <div class="mb-3">
            <label>Password</label>
            {{ form.password }}
        </div>

        <button class="btn btn-danger w-100">
            Login
        </button>
    </form>
</div>

    <div class="text-center mt-3">

        <a href="/users/register/" class="text-light">
            Don't have an account?
        </a>

    </div>


</body>
</html>
