{% extends 'base.html' %}

{% block content %}

<h1 class="mb-4">🎬 Movies</h1>

<form method="GET" class="mb-4">
    <input
        type="text"
        name="q"
        class="form-control"
        placeholder="Search movies..."
    >
</form>

<div class="row">
    {% for movie in movies %}
        <div class="col-md-3 mb-4">
            <div class="movie-card p-3 h-100">

                {% if movie.poster_url %}
                    <img
                        src="{{ movie.poster_url }}"
                        class="img-fluid rounded mb-3"
                    >
                {% endif %}

                <h4>{{ movie.title }}</h4>

                <p>{{ movie.release_year }}</p>

                <a href="{% url 'movie_detail' movie.id %}" class="btn btn-danger">
                    View Details
                </a>

            </div>
        </div>
    {% endfor %}
</div>

{% endblock %}
